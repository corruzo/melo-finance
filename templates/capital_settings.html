<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melo Finance">
    <meta name="theme-color" content="#043dae">
    <title>Melo Finance - Capital Inicial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#043dae",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            overscroll-behavior-y: contain;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-5xl mx-auto bg-white dark:bg-slate-900 md:shadow-2xl md:border-x border-slate-200 dark:border-slate-800">
        <div class="flex-1 flex items-center justify-center p-4">
            <div
                class="w-full max-w-md bg-white dark:bg-slate-900 shadow-2xl rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-800 flex flex-col p-6">

                <div class="text-center pt-8 pb-6">
                    <div
                        class="mx-auto w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-white text-4xl">account_balance_wallet</span>
                    </div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Capital Inicial
                    </h1>
                    <p class="mt-2 text-slate-500 dark:text-slate-400 font-medium text-sm">Define el capital total usado
                        para tu
                        cartera en dólares.</p>
                </div>

                <form method="POST" action="/settings/capital" class="flex-1 space-y-6">
                    <div class="space-y-4">
                        <div
                            class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                            <label class="block">
                                <span
                                    class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 ml-1">Capital
                                    en Dólares (USD)</span>
                                <div class="mt-2 flex items-center">
                                    <span
                                        class="material-symbols-outlined text-slate-400 mr-2 text-[20px]">attach_money</span>
                                    <input name="capital_usd" type="number" step="0.01"
                                        value="{{ user.capital_total_usd }}"
                                        class="block w-full border-0 p-0 text-slate-900 dark:text-white placeholder-slate-400 bg-transparent focus:ring-0 text-2xl font-bold"
                                        placeholder="0.00" required inputmode="decimal">
                                </div>
                            </label>
                        </div>

                        <div
                            class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                            <label class="block">
                                <span
                                    class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 ml-1">Capital
                                    en Bolívares (VES)</span>
                                <div class="mt-2 flex items-center">
                                    <span
                                        class="material-symbols-outlined text-slate-400 mr-2 text-[20px]">payments</span>
                                    <input name="capital_ves" type="number" step="0.01"
                                        value="{{ user.capital_total_ves }}"
                                        class="block w-full border-0 p-0 text-slate-900 dark:text-white placeholder-slate-400 bg-transparent focus:ring-0 text-2xl font-bold"
                                        placeholder="0.00" required inputmode="decimal">
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span>Guardar Capital</span>
                            <span class="material-symbols-outlined">check_circle</span>
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <a href="/dashboard"
                            class="text-sm font-semibold text-slate-400 hover:text-primary transition-colors">Cancelar y
                            volver
                            al Dashboard</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</body>

</html>
